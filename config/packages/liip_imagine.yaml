liip_imagine:
    resolvers:
        default:
            web_path:
                web_root: "%kernel.project_dir%/public"
                cache_prefix: "media/cache"

    loaders:
        default:
            filesystem:
                data_root: "%kernel.project_dir%/public"
    filter_sets:
        product_thumb:
            quality: 75
            filters:
                thumbnail:
                  size: [400, 400]
                  mode: outbound 
                format:
                 format: webp 